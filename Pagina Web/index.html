<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard IoT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>Panel de Control PLC</h1>

    <div class="dashboard-grid">
        <!-- Temperatura Exterior -->
        <div class="card">
            <h2>Temperatura Exterior</h2>
            <div class="valor" id="tempExt-display">-- °C</div>
            <div class="chart-container"><canvas id="tempExtChart"></canvas></div>
        </div>

        <!-- Temperatura PLC -->
        <div class="card">
            <h2>Temperatura PLC</h2>
            <div class="valor" id="tempPlc-display">-- °C</div>
            <div class="chart-container"><canvas id="tempPlcChart"></canvas></div>
        </div>

        <!-- Humedad -->
        <div class="card">
            <h2>Humedad</h2>
            <div class="valor" id="hum-display">-- %</div>
            <div class="chart-container"><canvas id="humChart"></canvas></div>
        </div>

        <!--  Estado PLC 1 -->
        <div class="card">
            <h2>Estado PLC1</h2>
            <div class="valor" id="estat-display">--</div>
            <div class="chart-container"><canvas id="estatChart"></canvas></div>
        </div>

        <!--  Piezas PLC 1 -->
        <div class="card">
            <h2>Piezas PLC1</h2>
            <div class="valor" id="peces-display">-- uds</div>
            <div class="chart-container"><canvas id="pecesChart"></canvas></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
